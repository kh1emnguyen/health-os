<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Health OS — Khiem Nguyen. Biological age and longevity dashboard." />
    <title>Health OS — Khiem Nguyen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <script>
      // Catch any JS error before React mounts and display it on screen
      window.addEventListener('error', function(e) {
        document.body.style.cssText = 'background:#0d1b2a;color:#f87171;font-family:monospace;padding:32px;';
        document.body.innerHTML = '<h2 style="margin-bottom:16px">&#9888; JS load error</h2><pre style="white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6;background:rgba(248,113,113,0.08);padding:16px;border-radius:8px">' + (e.message || '') + '\n\n' + (e.filename || '') + ':' + e.lineno + '\n\n' + (e.error && e.error.stack ? e.error.stack : '') + '</pre>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.style.cssText = 'background:#0d1b2a;color:#f87171;font-family:monospace;padding:32px;';
        document.body.innerHTML = '<h2 style="margin-bottom:16px">&#9888; Unhandled promise rejection</h2><pre style="white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.6;background:rgba(248,113,113,0.08);padding:16px;border-radius:8px">' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)) + '</pre>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
